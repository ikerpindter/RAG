name: CI

# Tests deterministas: sin API keys, sin secrets, sin red más allá de instalar
# dependencias. Si un test necesitara una key, está mal diseñado.
on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v6

      - name: Instalar dependencias
        run: uv sync

      - name: Correr tests
        run: uv run pytest tests/ -v
